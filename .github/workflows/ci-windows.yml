name: CI — Windows (.NET)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore windows/AirBridge.sln

      - name: Build
        run: dotnet build windows/AirBridge.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test windows/AirBridge.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: "**/*.trx"
